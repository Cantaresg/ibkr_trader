project:
  seed: 42
  log_level: INFO

universe:
  file: config/universe.yaml          # 123-stock S&P 500 universe (shared with main trader)
  n_stocks: 20                        # scanner output slots per episode

data:
  raw_dir: intraday_trader/data/raw
  processed_dir: intraday_trader/data/processed
  start_date: "2015-01-01"          # backfilled data covers 2015–2026 for all 124 tickers
  end_date: "2026-12-31"
  train_end: "2025-10-31"
  eval_start: "2025-11-01"
  eval_end: "2026-04-30"

features:
  lookback_bars: 14                  # 2 trading days of hourly bars
  n_stock_features: 16
  n_market_features: 5
  normalization_window_bars: 98      # 14 days × 7 bars

scanner:
  n_candidates: 20                   # stocks selected per day
  rankings_path: intraday_trader/data/processed/scanner/intraday_rankings.parquet
  weights:
    momentum:         0.30           # prior-day return, rank-normalised [-1, 1]
    volume:           0.25           # prior-day volume z-score vs 20-day avg, clipped [-2, 2]
    recovery:         0.20           # relu(prior_day_ret - (-threshold)), rank-normalised [0, 1]
    proximity_to_low: 0.25           # 52-week low proximity: 1=at low, 0=at high, rank-normalised
  recovery_threshold: 0.03           # stock must be down >3% on prior day to get recovery boost
  min_history_bars: 200              # minimum 1h bars before a ticker enters rankings
  intraday:
    enabled: false                   # optional second screener using current-day lagged signals
    refresh_every_n_bars: 1          # 1=hourly refresh; increase to reduce turnover
    rankings_path: intraday_trader/data/processed/scanner/intraday_live_rankings.parquet
    lookback_hours: 3
    min_history_bars: 200
    weights:
      momentum: 0.60                 # lagged 3h return rank
      volume: 0.25                   # lagged volume spike rank
      stability: 0.15                # prefers less vertical one-bar moves

environment:
  n_stocks: 20
  n_days_per_episode: 42             # ~2 calendar months per episode (v4: doubled for more context)
  initial_capital: 5000.0
  transaction_cost_bps: 5.0          # tighter spreads on large-cap liquid stocks
  bars_per_day: 7
  min_position_weight: 0.02          # zero stock slots below 2% of portfolio; rest flows to cash
  regime_balanced_sampling: true     # v5: oversample bear/neutral/bull equally using 100-bar SPY proxy rolling sum
  eod_force_flat: false              # v6: allow overnight holding; agent decides when to sell

reward:
  excess_return_weight: 2.0          # v3: balanced 4:3 ratio (v1=1:3 too passive, v2=3:1 too aggressive)
  drawdown_penalty_weight: 1.5       # v3: moderate drawdown penalty
  drawdown_threshold: 0.02           # relaxed to 2% to give model more room
  transaction_cost_weight: 0.5
  overnight_exposure_weight: 0.0     # v6: overnight holding allowed, no penalty
  diversification_weight: 0.0001     # v5: tiny nudge only; 0.005 was 2.5x portfolio signal and caused reward hacking

synthetic:
  synthetic_ratio: 0.15              # v5: halved; regime sampling already covers bear exposure
  synthetic_dir: intraday_trader/data/processed/synthetic_episodes

ppo:
  learning_rate: 1.0e-4              # v4: lowered 3x for stability (was 3e-4)
  n_steps: 2048                      # v4: doubled for more samples per update (was 1024)
  batch_size: 256                    # v4: doubled to match n_steps increase (was 128)
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005                    # v4b: near-zero; Gaussian+softmax → high ent_coef causes std explosion → concentrated bets
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  n_envs: 8
  device: cuda
  total_timesteps: 5_000_000

rppo:
  learning_rate: 1.0e-4              # v4: lowered 3x for stability (was 3e-4)
  n_steps: 2048                      # v4: doubled; (n_steps * n_envs) / batch_size = 64 ✓
  batch_size: 256                    # v4: doubled (was 128)
  n_epochs: 10
  gamma: 0.999                       # v6: higher discount for multi-week holding (was 0.99 → 6-week reward only 5% weight)
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005                    # v4b: near-zero; Gaussian+softmax → high ent_coef causes std explosion
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  lstm_hidden_size: 256              # v4: doubled for more memory capacity (was 128)
  n_lstm_layers: 1
  n_envs: 8
  device: cuda
  total_timesteps: 5_000_000

training:
  checkpoint_dir: intraday_trader/checkpoints/
  checkpoint_freq: 50_000
  eval_freq: 25_000
  eval_episodes: 10
  tensorboard_log: intraday_trader/logs/tensorboard/

ibkr:
  client_id: 2                       # separate from EOD system (client_id=1)
  risk:
    max_position_weight: 0.20
    max_sector_weight: 0.60
    daily_loss_limit: -0.015
    drawdown_halt_threshold: -0.05
    drawdown_resume_threshold: -0.02
  execution:
    order_timeout_seconds: 45
    buy_limit_offset: 0.01
    sell_limit_offset: 0.01
    eod_liquidate_hour_et: 15
    eod_liquidate_minute_et: 45
    bar_times_et: [[9,35],[10,35],[11,35],[12,35],[13,35],[14,35]]
